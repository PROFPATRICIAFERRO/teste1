<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AgroHeróis - Agro Forte, Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL -->
<section id="telaInicial" class="tela ativa">
    <div class="fundo-inicial-container">
        <div class="fundo-inicial"></div>
    </div>
    <div class="logos-iniciais">
        <img src="logo.png" class="logo-animada" alt="Logo">
        <img src="logo1.png" class="logo-animada" alt="Logo1">
        <img src="logo2.png" class="logo-animada" alt="Logo2">
    </div>
    <div class="centro">
        <button id="btnComecar" class="botao">COMEÇAR</button>
    </div>
    <div class="rodape">
        <p>jogo desenvolvido por Matheus Souza Nascimento – aluno 2º D Noturno</p>
        <p>Orientadora: Professora Mestre Patrícia Ariadny Ferro</p>
        <p>Colégio Estadual Antonio Tortato – NRE Paranavaí</p>
    </div>
</section>

<!-- TELA DE INTRODUÇÃO (DIÁLOGOS) -->
<section id="introducao" class="tela">
    <img src="1.png" class="fundo" alt="Fundo">
    <div class="logos">
        <img src="logo.png" alt="Logo">
        <img src="logo1.png" alt="Logo1">
        <img src="logo2.png" alt="Logo2">
    </div>
    <img src="principal1.png" class="adelita" alt="Adelita">
    <div class="caixaDialogo">
        <div id="textoDialogo"></div>
        <div id="entradaNome">
            <input type="text" id="nomeJogador" placeholder="Digite seu nome">
        </div>
        <div id="escolhaPersonagem">
            <h3>Escolha seu personagem</h3>
            <img src="menina.png" id="menina" class="personagemEscolha" alt="Menina">
            <img src="menino.png" id="menino" class="personagemEscolha" alt="Menino">
        </div>
        <button id="btnProximo" class="seta">➜</button>
    </div>
</section>
